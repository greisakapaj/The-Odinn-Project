<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The odin </title>
</style></style>
     <link rel="stylesheet" href="design.css"> 
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Norse+Bold&family=Cinzel:wght@900&family=MedievalSharp&display=swap" rel="stylesheet">
</head>
<body>

  <aside class="sidebar">
    <div class="logo">ODIN<img src="https://raw.githubusercontent.com/TheOdinProject/curriculum/5f37d43908ef92499e95a9b90fc3cc291a95014c/html_css/project-sign-up-form/odin-lined.png"></div>
  </aside>

  <main class="main">

    <section class="intro">
      <p>
        This is not a real online service! You know you need something
        like this in your life to help you realize your deepest dreams.
        Sign up <em>now</em> to get started.
      </p>
      <p>You <em>know</em> you want to.</p>
    </section>

    <section class="form-section">
      <h2>Let's do this!</h2>
      <div class="form-grid">
        <div class="field">
          <label for="first">FIRST NAME</label>
          <input type="text" id="first">
        </div>
        <div class="field">
          <label for="last">LAST NAME</label>
          <input type="text" id="last">
        </div>
        <div class="field">
          <label for="email">EMAIL</label>
          <input type="email" id="email">
        </div>
        <div class="field">
          <label for="phone">PHONE NUMBER</label>
          <input type="tel" id="phone">
        </div>
        <div class="field">
          <label for="password">PASSWORD</label>
          <input type="password" id="password">
        </div>
        <div class="field">
          <label for="confirm">CONFIRM PASSWORD</label>
          <input type="password" id="confirm">
        </div>
      </div>
    </section>

    <section class="cta">
      <button type="submit">Create Account</button>
      <p>Already have an account? <a href="#">Log in</a></p>
    </section>

  </main>

</body>
</html>
